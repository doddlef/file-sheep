services:
  postgres:
    image: postgres:17
    container_name: fs-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB not set}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER not set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
      interval: 60s
      timeout: 5s
      retries: 3
    volumes:
      - fs_postgres_data:/var/lib/postgresql/data
  redis:
    image: redis/redis-stack:7.4.0-v8
    container_name: fs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 60s
      timeout: 5s
      retries: 3

volumes:
  fs_postgres_data: