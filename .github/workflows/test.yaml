name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'fs_database' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'fs_root' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ${{ vars.POSTGRES_USER || 'fs_root' }} -d ${{ vars.POSTGRES_DB || 'fs_database' }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      POSTGRES_URL: jdbc:postgresql://localhost:5432/${{ vars.POSTGRES_DB || 'fs_database' }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER || 'fs_root' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install PostgreSQL client
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U "$POSTGRES_USER" -d "${POSTGRES_URL##*/}"; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Apply DB migrations for jOOQ codegen
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          psql "postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@localhost:5432/${POSTGRES_URL##*/}" -v ON_ERROR_STOP=1 -f src/main/resources/db/migration/V1__init.sql
          psql "postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@localhost:5432/${POSTGRES_URL##*/}" -v ON_ERROR_STOP=1 -f src/main/resources/db/migration/V2__auth.sql

      - name: Generate jOOQ sources
        run: ./gradlew --no-daemon jooqCodegen

      - name: Run tests
        run: ./gradlew --no-daemon test
