name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'fs_database' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'fs_root' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ${{ vars.POSTGRES_USER || 'fs_root' }} -d ${{ vars.POSTGRES_DB || 'fs_database' }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      POSTGRES_URL: jdbc:postgresql://localhost:5432/${{ vars.POSTGRES_DB || 'fs_database' }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER || 'fs_root' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Migrate, generate jOOQ, and test
        run: ./gradlew --no-daemon flywayMigrate jooqCodegen test
